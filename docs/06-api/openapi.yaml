          type: string
          format: date-time
      - in: query
        name: ends_before
        schema:
          type: string
          format: date-time
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: learner_id
        schema:
          type: number
      - in: query
        name: organization_id
        schema:
          type: number
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: starts_after
        schema:
          type: string
          format: date-time
      - in: query
        name: starts_before
        schema:
          type: string
          format: date-time
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCourseAccessRuleReadList'
          description: ''
    post:
      operationId: api_v1_courses_admin_access_rules_create
      description: Создаёт объект и возвращает read-представление.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseAccessRuleWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CourseAccessRuleWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CourseAccessRuleWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
