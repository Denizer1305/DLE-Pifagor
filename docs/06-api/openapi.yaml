        * `role_assigned` - Роль назначена
        * `role_approved` - Роль подтверждена
        * `role_rejected` - Роль отклонена
        * `role_revoked` - Роль отозвана
        * `join_request_created` - Заявка создана
        * `join_request_approved` - Заявка подтверждена
        * `join_request_rejected` - Заявка отклонена
        * `join_request_cancelled` - Заявка отменена
        * `join_request_expired` - Заявка истекла
        * `invite_code_created` - Код приглашения создан
        * `invite_code_used` - Код приглашения использован
        * `invite_code_expired` - Код приглашения истёк
        * `invite_code_disabled` - Код приглашения отключён
