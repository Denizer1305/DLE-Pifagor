        * `profile_updated` - Профиль обновлён
        * `profile_verified` - Профиль подтверждён
        * `profile_rejected` - Профиль отклонён
        * `avatar_submitted` - Аватар отправлен на модерацию
        * `avatar_approved` - Аватар одобрен
        * `avatar_rejected` - Аватар отклонён
        * `guardian_link_created` - Связь родителя и учащегося создана
        * `guardian_link_approved` - Связь родителя и учащегося подтверждена
        * `guardian_link_rejected` - Связь родителя и учащегося отклонена
        * `guardian_link_revoked` - Связь родителя и учащегося отозвана
        * `user_blocked` - Пользователь заблокирован
        * `user_unblocked` - Пользователь разблокирован
        * `user_archived` - Пользователь архивирован
        * `user_restored` - Пользователь восстановлен
        * `user_scheduled_for_deletion` - Пользователь запланирован к удалению
        * `user_anonymized` - Пользователь анонимизирован
        * `login_success` - Успешный вход
        * `login_failed` - Неудачная попытка входа
        * `logout` - Выход из системы
