  /api/v1/courses/admin/courses/:
    get:
      operationId: api_v1_courses_admin_courses_list
      description: API курсов.
      parameters:
      - in: query
        name: academic_year_id
        schema:
          type: number
      - in: query
        name: allow_self_enrollment
        schema:
          type: boolean
      - in: query
        name: course_type
        schema:
          type: string
          title: Тип курса
          enum:
          - academic
          - author
          - club
          - elective
          - exam_prep
          - intensive
        description: |-
          * `academic` - Академический
          * `author` - Авторский
          * `exam_prep` - Подготовка к экзамену
          * `intensive` - Интенсив
          * `club` - Кружок / клуб
          * `elective` - Факультатив
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
      - in: query
        name: ends_after
        schema:
          type: string
          format: date-time
      - in: query
        name: ends_before
        schema:
          type: string
          format: date-time
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_template
        schema:
          type: boolean
      - in: query
        name: organization_id
        schema:
          type: number
      - in: query
        name: origin
        schema:
          type: string
          title: Источник курса
          enum:
          - education_load
          - ktp_import
          - manual
          - template
        description: |-
          * `manual` - Создан вручную
          * `ktp_import` - Импортирован из КТП
          * `education_load` - Создан из нагрузки
          * `template` - Создан из шаблона
      - in: query
        name: owner_teacher_id
        schema:
          type: number
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: period_id
        schema:
          type: number
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: starts_after
        schema:
          type: string
          format: date-time
      - in: query
        name: starts_before
        schema:
          type: string
          format: date-time
      - in: query
        name: status
        schema:
          type: string
          title: Статус
          enum:
          - archived
          - draft
          - published
        description: |-
          * `draft` - Черновик
          * `published` - Опубликован
          * `archived` - Архивирован
      - in: query
        name: subject_id
        schema:
          type: number
      - in: query
        name: updated_after
        schema:
          type: string
          format: date-time
      - in: query
        name: updated_before
        schema:
          type: string
          format: date-time
      - in: query
        name: visibility
        schema:
          type: string
          title: Видимость
          enum:
          - assigned_only
          - organization
          - private
          - public_link
        description: |-
          * `private` - Приватный
          * `assigned_only` - Только назначенным
          * `organization` - Внутри организации
          * `public_link` - По публичной ссылке
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
