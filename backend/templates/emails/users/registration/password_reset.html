<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#eef1f6;font-family:Arial,sans-serif;color:#2f394b;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="padding:32px 16px;">
        <tr>
            <td align="center">
                <table width="640" cellpadding="0" cellspacing="0" role="presentation" style="max-width:640px;background:#ffffff;border-radius:28px;padding:36px;">
                    <tr>
                        <td>
                            <h1 style="margin:0 0 18px;font-size:32px;line-height:1.1;color:#394458;">
                                {{ title }}
                            </h1>

                            <p style="font-size:16px;line-height:1.7;color:#6f7482;">
                                {{ greeting }}
                            </p>

                            <p style="font-size:16px;line-height:1.7;color:#6f7482;">
                                Мы получили запрос на восстановление пароля в {{ platform_name }}.
                            </p>

                            <p style="margin:28px 0;">
                                <a href="{{ action_url }}" style="display:inline-block;padding:15px 24px;border-radius:999px;background:#394458;color:#ffffff;text-decoration:none;font-weight:700;">
                                    {{ action_label }}
                                </a>
                            </p>

                            <p style="font-size:14px;line-height:1.7;color:#8a8a9f;">
                                Если кнопка не работает, скопируйте ссылку:
                                <br />
                                <a href="{{ action_url }}" style="color:#4a6fa5;">{{ action_url }}</a>
                            </p>

                            <p style="font-size:14px;line-height:1.7;color:#8a8a9f;">
                                {{ security_note }}
                            </p>

                            <p style="margin-top:28px;font-size:14px;color:#8a8a9f;">
                                {{ signature }}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
