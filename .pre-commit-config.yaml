default_language_version:
    python: python3.12
    node: "22.0.0"

exclude: |
    (?x)^(
        \.venv/|
        venv/|
        env/|
        node_modules/|
        frontend/node_modules/|
        frontend/dist/|
        backend/media/|
        backend/staticfiles/|
        design/presentations/fonts/|
        .*\.svg$
    )

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
            exclude: >
                (?x)^(
                    .*\.md$|
                    .*\.svg$
                )

          - id: end-of-file-fixer
            exclude: >
                (?x)^(
                    .*\.svg$|
                    .*\.ttf$|
                    .*\.pptx$|
                    .*\.pdf$|
                    .*\.png$|
                    .*\.jpg$|
                    .*\.jpeg$|
                    .*\.webp$
                )

          - id: check-yaml
            args:
                - --allow-multiple-documents

          - id: check-json
            exclude: >
                (?x)^(
                    frontend/tsconfig.*\.json$
                )

          - id: check-toml
          - id: check-xml
          - id: check-merge-conflict
          - id: check-case-conflict

          - id: check-added-large-files
            args:
                - --maxkb=2048

          - id: mixed-line-ending
            args:
                - --fix=lf

          - id: detect-private-key
          - id: debug-statements
          - id: check-ast

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.8.6
      hooks:
          - id: ruff
            name: ruff backend
            args:
                - --fix
            files: ^backend/
            types_or:
                - python
                - pyi

    - repo: https://github.com/psf/black
      rev: 24.10.0
      hooks:
          - id: black
            name: black backend
            files: ^backend/
            language_version: python3.12

    - repo: https://github.com/pycqa/isort
      rev: 5.13.2
      hooks:
          - id: isort
            name: isort backend
            files: ^backend/
            args:
                - --profile
                - black

    - repo: local
      hooks:
          - id: django-check
            name: django check
            entry: python backend/manage.py check
            language: system
            pass_filenames: false
            files: ^backend/.*\.py$

          - id: django-migrations-check
            name: django migrations check
            entry: python backend/manage.py makemigrations --check --dry-run
            language: system
            pass_filenames: false
            files: ^backend/apps/.*(models|constants|managers|validators).*\.py$

          - id: frontend-typecheck
            name: frontend typecheck
            entry: npm --prefix frontend run typecheck --if-present
            language: system
            pass_filenames: false
            files: ^frontend/src/.*\.(ts|tsx|vue)$
